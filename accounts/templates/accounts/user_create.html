{% extends 'base.html' %}

{% block title %}Новый пользователь{% endblock %}

{% block content %}
<h2><i class="bi bi-person-plus"></i> Новый пользователь</h2>

<div class="card" style="max-width: 600px;">
    <div class="card-body">
        <form method="POST">
            {% csrf_token %}

            {% for field in form %}
                <div class="mb-3">
                    <label class="form-label">{{ field.label }}</label>
                    {{ field }}
                    {% if field.errors %}
                        <div class="text-danger small">{{ field.errors.0 }}</div>
                    {% endif %}
                </div>
            {% endfor %}

            <button type="submit" class="btn btn-primary">Создать</button>
            <a href="{% url 'accounts:user_list' %}" class="btn btn-outline-secondary">Отмена</a>
        </form>
    </div>
</div>
{% endblock %}
